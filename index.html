<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />

    <title>pxvault</title>

    <link rel="stylesheet" href="assets/main.css" />
  </head>

  <body class="fade">
    <img class="bg" src="assets/bg.png" />

    <div id="panel">
      <div class="profile">
        <img class="avatar" src="assets/catghost.png" />

        <h1>pxvault</h1>

        <p>(select with arrow keys)</p>
      </div>

      <div class="selector">
        <div class="buttons">
          <div class="btn selected" data-id="github">
            <img class="icon dark" src="assets/github-dark.svg" />
            <img class="icon light" src="assets/github-light.svg" />
          </div>

          <div class="btn" data-id="blog">
            <img class="icon dark" src="assets/blog-dark.svg" />
            <img class="icon light" src="assets/blog-light.svg" />
          </div>

          <div class="btn" data-id="file">
            <img class="icon dark" src="assets/file-dark.svg" />
            <img class="icon light" src="assets/file-light.svg" />
          </div>
        </div>
      </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/anim.js"></script>
  </body>
</html>
